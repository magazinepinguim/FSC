<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSC - Crédito Premium</title>
    <style>
        /* Estilo Black & Gold */
        body {
            background-color: #000; /* Fundo Preto */
            color: #d4af37; /* Dourado Clássico */
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: linear-gradient(145deg, #1a1a1a, #000000);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 10px 10px 20px #050505, -5px -5px 15px #222; /* Efeito de profundidade 3D */
            border: 1px solid #d4af37;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h2 {
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #f1d592;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border: none;
            border-radius: 10px;
            background: #111;
            color: #fff;
            box-shadow: inset 3px 3px 6px #000, inset -1px -1px 3px #333;
            font-size: 18px;
            box-sizing: border-box;
            outline: none;
        }

        /* Botão Dourado em Alto Relievo */
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(145deg, #d4af37, #b8860b);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.4), inset 1px 1px 2px rgba(255,255,255,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.6);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>FSC Empréstimos</h2>
    
    <label for="valor">VALOR DA SIMULAÇÃO</label>
    <input type="number" id="valor" placeholder="R$ 0,00" step="0.01">

    <button onclick="enviarSimulacao()">Solicitar Agora</button>
    
    <div class="footer-text">Simulação com taxa de 40% inclusa.</div>
</div>

<script>
    function enviarSimulacao() {
        const valorInput = document.getElementById('valor').value;
        const meuNumero = "5515996067098"; // COLOQUE SEU NÚMERO AQUI

        if (!valorInput || valorInput <= 0) {
            alert("Por favor, digite o valor que você precisa.");
            return;
        }

        const valorOriginal = parseFloat(valorInput);
        const juros = 0.40; // 40% de juro
        const valorTotal = valorOriginal * (1 + juros);

        // Mensagem formatada
        const mensagem = `Olá FSC! Gostaria de solicitar um empréstimo.%0A%0A` +
                         `*Valor:* R$ ${valorOriginal.toFixed(2)}%0A` +
                         `*Total (com 40% de juros):* R$ ${valorTotal.toFixed(2)}`;

        const url = `https://wa.me/${meuNumero}?text=${mensagem}`;

        window.open(url, '_blank');
    }
</script>

</body>
</html>
