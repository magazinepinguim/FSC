<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSC Empréstimos - Linktree</title>
    <style>
        /* Estilização Geral */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Fundo escuro luxo */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        /* Logo Personalizado */
        .logo-container img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid #d4af37; /* Borda dourada */
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0px 4px 15px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #d4af37; /* Dourado */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* Botões */
        .links-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: #121212;
            background-color: #d4af37; /* Dourado principal */
            padding: 15px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: scale(1.03);
            background-color: #f1c40f; /* Dourado mais brilhante no hover */
        }

        /* Botão Secundário / Transparente */
        .btn-outline {
            background-color: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
        }

        .btn-outline:hover {
            background-color: rgba(212, 175, 55, 0.1);
            color: #f1c40f;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="image.png" alt="FSC Empréstimos">
        </div>

        <h1>FSC Empréstimos</h1>
        <p>Soluções financeiras rápidas e seguras.</p>

        <div class="links-area">
            <a href="https://wa.me/SEUNUMERO" class="btn">
                Simular Empréstimo via WhatsApp
            </a>

            <a href="#" class="btn btn-outline">
                Consultar Taxas e Prazos
            </a>

            <a href="#" class="btn btn-outline">
                Área do Cliente
            </a>

            <a href="#" class="btn btn-outline">
                Nossos Serviços
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 FSC Empréstimos - Todos os direitos reservados.
    </footer>

</body>
</html>
